spring.application.name=sector-7g-safety-ledger
server.port=${SERVER_PORT:8080}

# Local defaults for development. Use managed Azure database settings in production.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:snpp;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# create-drop is fine for the ephemeral H2 dev/test database, but is dangerous
# against a shared, persistent Postgres instance once the app can scale to more
# than one replica (or scale-to-zero and back): each new replica startup would
# drop and recreate the schema out from under any sibling replica mid-query,
# causing "relation does not exist" errors. Production overrides this to
# `update` via SPRING_JPA_HIBERNATE_DDL_AUTO (see infra/resources.bicep).
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# Secrets are resolved from environment variables or Azure Key Vault.
plant.security.api-key=${PLANT_API_KEY:}
