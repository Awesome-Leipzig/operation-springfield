spring.application.name=sector-7g-safety-ledger
server.port=${SERVER_PORT:8080}

# Local defaults for development. Use managed Azure database settings in production.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:snpp;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# Secrets are resolved from environment variables or Azure Key Vault.
plant.security.api-key=${PLANT_API_KEY:}
