name: Deploy to Azure Container Apps

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-azure-main
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (Java 21)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: mvn clean verify
        run: mvn -B clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

  deploy:
    name: Deploy app (azd)
    runs-on: ubuntu-latest
    needs: build-and-test
    outputs:
      app-url: ${{ steps.app-url.outputs.url }}
    env:
      AZURE_CORE_OUTPUT: none
      AZD_ENV_NAME: github-main
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Configure azd environment
        shell: bash
        run: |
          azd env new "$AZD_ENV_NAME" --no-prompt || azd env select "$AZD_ENV_NAME"
          azd env set AZURE_LOCATION "${{ secrets.AZURE_LOCATION }}"
          azd env set AZURE_RESOURCE_GROUP "${{ secrets.AZURE_RESOURCE_GROUP }}"
          azd env set AZURE_SUBSCRIPTION_ID "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Refresh azd environment values from Azure
        run: azd env refresh --no-prompt

      - name: Deploy web service
        run: azd deploy web --no-prompt

      - name: Resolve deployed app URL
        id: app-url
        shell: bash
        env:
          AZURE_CORE_OUTPUT: json
        run: |
          FQDN=$(az containerapp show \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$FQDN" >> "$GITHUB_OUTPUT"

  smoke-test:
    name: Smoke test deployed app
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run smoke tests
        shell: bash
        run: |
          chmod +x ./scripts/smoke-test.sh
          ./scripts/smoke-test.sh "${{ needs.deploy.outputs.app-url }}"
