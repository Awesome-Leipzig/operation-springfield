name: Provision Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      azd_environment_name:
        description: azd environment name to provision or refresh
        required: true
        default: github-main
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  provision:
    name: Provision infra (azd)
    runs-on: ubuntu-latest
    env:
      AZURE_CORE_OUTPUT: none
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Configure azd environment
        shell: bash
        run: |
          azd env new "${{ inputs.azd_environment_name }}" --no-prompt || azd env select "${{ inputs.azd_environment_name }}"
          azd env set AZURE_LOCATION "${{ secrets.AZURE_LOCATION }}"
          azd env set AZURE_RESOURCE_GROUP "${{ secrets.AZURE_RESOURCE_GROUP }}"
          azd env set AZURE_SUBSCRIPTION_ID "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Provision Azure resources
        run: azd provision --no-prompt

      - name: Refresh azd environment values from Azure
        run: azd env refresh --no-prompt
